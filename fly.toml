# fly.toml app configuration file generated for yonin-shogi on 2026-06-11T13:34:05Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'yonin-shogi'
primary_region = 'iad'

[build]

[env]
  YONIN_HOST = '0.0.0.0'
  YONIN_PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
